<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
</head>
<body>

<h2>Staff Login</h2>

<form method="POST" autocomplete="off">

    <!-- Username with hidden quick-select options -->
    <input list="usernames" name="user" placeholder="Username" autocomplete="off" required><br>

    <datalist id="usernames">
        <option value="steve">
        <option value="trevor">
        <option value="tamara">
    </datalist>

    <input type="password" name="password" placeholder="Password" required><br>

    {% if error %}
        <div style="color:red;">{{ error }}</div>
    {% endif %}

    <button type="submit">Login</button>
</form>

</body>
</html>
