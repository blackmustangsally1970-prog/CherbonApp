<!DOCTYPE html>
<html>
<head>
    <title>Login</title>

<style>
    /* BASE */
    body {
        font-family: sans-serif;
        padding: 20px;
        text-align: center;
    }

    h2 {
        margin-bottom: 40px;
        font-size: 40px;
    }

    /* FORCE VERTICAL STACK ON MOBILE */
    form {
        display: flex;
        flex-direction: column;
        align-items: center;
        width: 100%;
    }

    /* MOBILE FIRST — SUPER MASSIVE */
    input[type="text"],
    input[type="password"],
    input[list] {
        width: 100%;
        padding: 55px;
        font-size: 52px;
        margin-bottom: 50px;
        border: 6px solid #4a6bff;
        border-radius: 24px;
        box-sizing: border-box;
        font-weight: 700;
    }

    button {
        width: 100%;
        padding: 60px;
        font-size: 56px;
        font-weight: 900;
        background: #4a6bff;
        color: white;
        border: none;
        border-radius: 24px;
        cursor: pointer;
    }

    button:hover {
        background: #3a56d6;
    }

    /* DESKTOP OVERRIDE */
    @media (min-width: 800px) {
        input[type="text"],
        input[type="password"],
        input[list] {
            width: 300px;
            padding: 12px;
            font-size: 16px;
            margin-bottom: 14px;
        }

        button {
            width: 300px;
            padding: 14px;
            font-size: 18px;
            font-weight: 700;
        }

        h2 {
            font-size: 26px;
        }
    }
</style>

</head>
<body>

<h2>Staff Login</h2>

<form method="POST" autocomplete="off">

    <input list="usernames" name="user" placeholder="Username" autocomplete="off" required>

    <datalist id="usernames">
        <option value="steve">
        <option value="trevor">
        <option value="tamara">
    </datalist>

    <input type="password" name="password" placeholder="Password" required>

    {% if error %}
        <div style="color:red; margin-top:10px; font-size:28px;">{{ error }}</div>
    {% endif %}

    <button type="submit">Login</button>
</form>

</body>
</html>
