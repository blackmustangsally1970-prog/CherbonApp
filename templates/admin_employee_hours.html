<!DOCTYPE html>
<html>
<head>
    <title>Employee Hours</title>
    <style>
        body { font-family: Arial; padding: 20px; background:#f5f5f5; }
        table { width:100%; border-collapse:collapse; background:white; }
        th, td { padding:10px; border-bottom:1px solid #ddd; }
        th { background:#eee; }
        h2 { margin-bottom:20px; }
    </style>
</head>
<body>

<div class="top-controls">
<a href="{{ url_for('employees_home') }}" class="menu-btn-small">← Employees Menu</a>
</div>

<h2>Employee Hours</h2>

<table>
    <tr>
        <th>Date</th>
        <th>Employee</th>
        <th>Sign In</th>
        <th>Break Start</th>
        <th>Break End</th>
        <th>Sign Out</th>
    </tr>

    {% for row in rows %}
    <tr>
        <td>{{ row.date }}</td>
        <td>{{ row.employee.full_name if row.employee else "Unknown" }}</td>
        <td>{{ row.sign_in }}</td>
        <td>{{ row.break_start }}</td>
        <td>{{ row.break_end }}</td>
        <td>{{ row.sign_out }}</td>
    </tr>
    {% endfor %}
</table>

</body>
</html>
