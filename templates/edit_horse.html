<!doctype html>
<html>
<head>
    <meta charset="utf-8">
    <title>Edit Horse</title>

    <style>
        body { font-family: sans-serif; margin: 20px; }

        .menu-btn-small {
            display: inline-block;
            background: #eee;
            border: 1px solid #aaa;
            padding: 8px 14px;
            border-radius: 6px;
            font-size: 14px;
            color: #0645AD;
            text-decoration: none;
            margin-right: 12px;
        }
        .menu-btn-small:hover {
            background: #ddd;
        }

        input[type="text"], input[type="number"] { width: 200px; }
    </style>
</head>

<body>

<div style="margin-bottom:12px;">
    <a href="{{ url_for('manage_horses_page') }}" class="menu-btn-small">← Back to Horses</a>
</div>

<h1>Edit Horse: {{ horse.horse }}</h1>

<form method="POST" action="{{ url_for('edit_horse_save', hid=horse.horse_id) }}">

    <p>
        <label>Name:</label><br>
        <input type="text" name="horse" value="{{ horse.horse }}" required>
    </p>

    <p>
        <label>OrderPDK:</label><br>
        <input type="text" name="orderpdk" value="{{ horse.orderpdk }}">
    </p>

    <p>
        <label>Age:</label><br>
        <input type="number" name="age" value="{{ horse.age }}">
    </p>

    <p>
        <label>Sex:</label><br>
        <input type="text" name="sex" value="{{ horse.sex }}">
    </p>

    <button type="submit">Save Changes</button>

</form>

</body>
</html>
