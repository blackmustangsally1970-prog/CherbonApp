<!DOCTYPE html>
<html>
<head>
    <title>Override — {{ emp.full_name }}</title>
    <style>
        body { 
            font-family: Arial; 
            background:#f5f5f5; 
            padding:40px; 
        }

        h2 { 
            font-size:32px; 
            margin-bottom:25px; 
        }

        .box {
            background:white; 
            padding:25px; 
            border-radius:12px;
            box-shadow:0 3px 10px rgba(0,0,0,0.15); 
            margin-bottom:20px;
            max-width:600px;
        }

        label { 
            font-size:18px; 
            font-weight:bold; 
            display:block; 
            margin-top:15px; 
        }

        input { 
            width:100%; 
            padding:12px; 
            font-size:18px; 
            border-radius:8px; 
            border:1px solid #ccc; 
            margin-top:5px;
        }

        .btn {
            margin-top:25px; 
            width:100%; 
            padding:16px;
            background:#2a7ae2; 
            color:white; 
            border:none;
            border-radius:10px; 
            font-size:20px; 
            cursor:pointer;
        }

        .btn:hover { background:#1f5fb4; }

        .create-btn {
            margin-top:25px; 
            width:100%; 
            padding:16px;
            background:#28a745; 
            color:white; 
            border:none;
            border-radius:10px; 
            font-size:20px; 
            cursor:pointer;
        }

        .create-btn:hover { background:#1e7e34; }

        .back-btn {
            margin-top:20px; 
            width:260px; 
            padding:16px;
            background:#777; 
            color:white; 
            border:none;
            border-radius:10px; 
            font-size:20px; 
            cursor:pointer;
        }

        .back-btn:hover { background:#555; }
    </style>
</head>
<body>

<h2>{{ date.strftime("%A %-d %B %Y") }} — {{ emp.full_name }}</h2>

<div class="box">

    {% if row %}
    <!-- ⭐ EDIT EXISTING DAY -->
    <form method="POST" action="/admin/employees/hours/{{ row.id }}/edit">

        <label>Start Work</label>
        <input type="datetime-local" name="sign_in"
               value="{{ row.sign_in.isoformat() if row.sign_in else '' }}">

        <label>Break Start</label>
        <input type="datetime-local" name="break_start"
               value="{{ row.break_start.isoformat() if row.break_start else '' }}">

        <label>Break End</label>
        <input type="datetime-local" name="break_end"
               value="{{ row.break_end.isoformat() if row.break_end else '' }}">

        <label>Finish Work</label>
        <input type="datetime-local" name="sign_out"
               value="{{ row.sign_out.isoformat() if row.sign_out else '' }}">

        <button class="btn" type="submit">Save Changes</button>
    </form>

    {% else %}
    <!-- ⭐ NO ROW EXISTS — OFFER TO CREATE ONE -->
    <p>No hours recorded for this day.</p>

    <form method="POST" action="/admin/employees/hours/create_missing">
        <input type="hidden" name="emp_id" value="{{ emp.id }}">
        <input type="hidden" name="date" value="{{ date }}">
        <button class="create-btn">Create Empty Day</button>
    </form>
    {% endif %}

</div>

<button class="back-btn" onclick="window.location.href='/admin/employees/{{ emp.id }}/hours'">
    Back
</button>

</body>
</html>
