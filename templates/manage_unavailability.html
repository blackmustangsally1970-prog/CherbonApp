<!doctype html>
<html>
<head>
    <meta charset="utf-8">
    <title>Staff Unavailability</title>

    <style>
        body { font-family: sans-serif; padding: 20px; }
        h1 { margin-bottom: 20px; }

        .menu-btn {
            padding: 8px 14px;
            background: #0645AD;
            color: white;
            text-decoration: none;
            border-radius: 4px;
            margin-right: 6px;
        }
        .menu-btn:hover { background: #003f8a; }

        .add-btn {
            padding: 8px 14px;
            background: green;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            margin-top: 10px;
        }
        .add-btn:hover { background: #0a6f0a; }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }

        table th, table td {
            border: 1px solid #ccc;
            padding: 8px;
        }

        table th {
            background: #f0f0f0;
        }

        .delete-link {
            color: red;
            text-decoration: none;
            font-size: 18px;
        }
        .delete-link:hover {
            color: darkred;
        }
    </style>
</head>
<body>

<a href="{{ url_for('wedding_staffing') }}" class="menu-btn">← Back</a>

<h1>Staff Unavailability</h1>

<form method="post">
    <label>Staff</label><br>
    <select name="staff_id" required>
        {% for s in staff_list %}
            <option value="{{ s.id }}">{{ s.name }}</option>
        {% endfor %}
    </select>
    <br><br>

    <label>Date</label><br>
    <input type="date" name="date" required>
    <br><br>

    <label>Reason (optional)</label><br>
    <input type="text" name="reason" placeholder="Away, holiday, other job">
    <br><br>

    <button class="add-btn">Add</button>
</form>

<hr>

<h2>Existing Unavailability</h2>

<table>
    <tr>
        <th>Staff</th>
        <th>Date</th>
        <th>Reason</th>
        <th>Delete</th>
    </tr>

    {% for u in unavailability %}
    <tr>
        <td>{{ u.staff.name }}</td>
        <td>{{ u.date }}</td>
        <td>{{ u.reason or '' }}</td>
        <td>
            <a href="{{ url_for('delete_unavailability', id=u.id) }}" class="delete-link">🗑</a>
        </td>
    </tr>
    {% endfor %}
</table>

</body>
</html>
