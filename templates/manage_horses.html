<!doctype html>
<html>
<head>
    <meta charset="utf-8">
    <title>Manage Horses</title>

    <style>
        body { font-family: sans-serif; margin: 20px; }

        .menu-btn-small {
            display: inline-block;
            background: #eee;
            border: 1px solid #aaa;
            padding: 8px 14px;
            border-radius: 6px;
            font-size: 14px;
            color: #0645AD;
            text-decoration: none;
            margin-right: 12px;
        }
        .menu-btn-small:hover {
            background: #ddd;
        }

        table { border-collapse: collapse; width: 100%; margin-top: 20px; }
        th, td { border: 1px solid #ccc; padding: 8px; font-size: 14px; }
        th { background: #f2f2f2; }
        input[type="text"], input[type="number"] { width: 120px; }
        form { margin: 0; }
    </style>
</head>

<body>

<div style="margin-bottom:12px;">
    <a href="{{ url_for('dashboard') }}" class="menu-btn-small">← Main Menu</a>
    <a href="{{ url_for('other_tools') }}" class="menu-btn-small">← Other Tools</a>
</div>

<h1>Manage Horses</h1>

<form method="POST" action="{{ url_for('add_horse') }}">
    <input type="text" name="horse" placeholder="Horse name" required>
    <input type="text" name="orderpdk" placeholder="Order PDK">
    <input type="number" name="age" placeholder="Age">
    <input type="text" name="sex" placeholder="Sex">
    <button type="submit">Add Horse</button>
</form>

<table>
    <tr>
        <th>Name</th>
        <th>OrderPDK</th>
        <th>Age</th>
        <th>Sex</th>
        <th>Save</th>
        <th>Edit</th>
        <th>Delete</th>
    </tr>

    {% for h in horses %}
    <tr>
        <form method="POST" action="{{ url_for('update_horse_inline', hid=h.horse_id) }}">
            <td><input type="text" name="horse" value="{{ h.horse }}"></td>
            <td><input type="text" name="orderpdk" value="{{ h.orderpdk }}"></td>
            <td><input type="number" name="age" value="{{ h.age }}"></td>
            <td><input type="text" name="sex" value="{{ h.sex }}"></td>
            <td><button type="submit">Save</button></td>
        </form>

        <td>
            <a href="{{ url_for('edit_horse_page', hid=h.horse_id) }}">Edit</a>
        </td>

        <td>
            <form method="POST" action="{{ url_for('delete_horse', hid=h.horse_id) }}">
                <button type="submit" onclick="return confirm('Delete horse?')">Delete</button>
            </form>
        </td>
    </tr>
    {% endfor %}
</table>

</body>
</html>
