    <!doctype html>
    <html lang="en">
    <head>
        <meta charset="utf-8">
        <title>Your Week</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

        <style>
            .day-tile {
                border-radius: 10px;
                padding: 18px;
                margin-bottom: 12px;
                background: #ffffff;
                border: 1px solid #ddd;
                text-decoration: none;
                color: #000;
                display: block;
            }
            .day-tile:hover {
                background: #f0f8ff;
            }
            .day-status {
                font-size: 0.9rem;
                color: #666;
            }
            .today {
                border: 2px solid #0d6efd;
                background: #e7f1ff;
            }
        </style>
    </head>

    <body class="bg-light">

    <div class="container py-4" style="max-width: 500px;">

        <h3 class="mb-4 text-center">Your Week</h3>

        {% for d in days %}
            <a href="/employeehours/day?date={{ d.date }}" class="day-tile {% if d.is_today %}today{% endif %}">
                <div class="d-flex justify-content-between">
                    <div>
                        <strong>{{ d.date.strftime('%A %d %B') }}</strong>
                        <div class="day-status">
                            {% if d.complete %}
                                ✔ Complete
                            {% else %}
                                Incomplete
                            {% endif %}
                        </div>
                    </div>
                </div>
            </a>
        {% endfor %}

    </div>

    </body>
    </html>
