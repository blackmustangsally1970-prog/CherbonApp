    <!doctype html>
    <html lang="en">
    <head>
        <meta charset="utf-8">
        <title>Your Week</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

        <style>
            .day-tile {
                border-radius: 10px;
                padding: 18px;
                margin-bottom: 12px;
                background: #ffffff;
                border: 1px solid #ddd;
                text-decoration: none;
                color: #000;
                display: block;
            }
            .day-tile:hover {
                background: #f0f8ff;
            }
            .today {
                border: 2px solid #0d6efd;
                background: #e7f1ff;
            }
            .future {
                opacity: 0.5;
            }
        </style>
    </head>

    <body class="bg-light">

    <div class="container py-4" style="max-width: 500px;">

        <h3 class="mb-4 text-center">Your Week</h3>

        {% for d in days %}
            <a href="/employeehours/day?date={{ d.date }}"
               class="day-tile
                      {% if d.status == 'today' %}today{% endif %}
                      {% if d.status == 'future' %}future{% endif %}">

                <strong>{{ d.date.strftime('%A %d %B') }}</strong><br>

                {% if d.status == 'complete' %}
                    ✔ Complete
                {% elif d.status == 'today' %}
                    Today — not finished
                {% elif d.status == 'future' %}
                    Future day
                {% else %}
                    Incomplete
                {% endif %}
            </a>
        {% endfor %}

    </div>

    </body>
    </html>
