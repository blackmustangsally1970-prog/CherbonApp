<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Your Week</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container py-4">

    <h2 class="mb-4">Your Week</h2>

    <div class="row g-3">
        {% for d in days %}
        <div class="col-6 col-md-3 col-lg-2">
            <div class="card text-center
                {% if d.status == 'today' %} border-primary {% endif %}
                {% if d.status == 'complete' %} border-success {% endif %}
                {% if d.status == 'incomplete' %} border-warning {% endif %}
                {% if d.status == 'future' %} border-secondary {% endif %}
            ">
                <div class="card-body py-3">
                    <h6 class="card-title mb-2">{{ d.date.strftime("%a") }}</h6>
                    <p class="mb-2">{{ d.date.strftime("%d %b") }}</p>

                    {% if d.status == 'today' %}
                        <span class="badge bg-primary">Today</span>
                    {% elif d.status == 'complete' %}
                        <span class="badge bg-success">Complete</span>
                    {% elif d.status == 'incomplete' %}
                        <span class="badge bg-warning text-dark">Incomplete</span>
                    {% else %}
                        <span class="badge bg-secondary">Future</span>
                    {% endif %}
                </div>
            </div>
        </div>
        {% endfor %}
    </div>

</div>
</body>
</html>
