<!doctype html>
<html>
<head>
    <meta charset="utf-8">
    <title>Add Wedding</title>

    <style>
        body { font-family: sans-serif; padding: 20px; }
        label { font-weight: bold; display: block; margin-top: 12px; }
        input, textarea {
            width: 300px;
            padding: 6px;
            margin-top: 4px;
        }
        .menu-btn {
            padding: 8px 14px;
            background: #0645AD;
            color: white;
            text-decoration: none;
            border-radius: 4px;
            margin-right: 6px;
        }
        .menu-btn:hover { background: #003f8a; }
        .save-btn {
            margin-top: 20px;
            padding: 10px 16px;
            background: green;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        .save-btn:hover { background: #0a6f0a; }
    </style>
</head>
<body>

<a href="{{ url_for('wedding_staffing') }}" class="menu-btn">← Back</a>

<h1>Add New Wedding</h1>

<form method="post">

    <label>Date</label>
    <input type="date" name="date" required>

    <button class="save-btn">Save Wedding</button>
</form>

</body>
</html>
