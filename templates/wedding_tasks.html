<h2>Wedding Tasks</h2>

{% if user.role == 'staff' %}
    <h3>Staff Tasks</h3>
{% elif user.role == 'coordinator' %}
    <h3>Coordinator + Staff Tasks</h3>
{% else %}
    <h3>All Tasks (Management)</h3>
{% endif %}

<div>
    {% for task in tasks %}
        <div style="margin-bottom: 12px; padding: 8px; border-bottom: 1px solid #ccc;">
            
            <label>
                <input type="checkbox"
                       class="task-check"
                       data-id="{{ task.id }}"
                       {% if task.is_done %}checked{% endif %}>
                {{ task.task_name }}
            </label>

            {% if task.is_done %}
                <div style="font-size: 12px; color: #555;">
                    Done by {{ task.done_by_name }} at {{ task.done_at }}
                </div>
            {% endif %}

        </div>
    {% endfor %}
</div>

<script src="/static/task_update.js"></script>
