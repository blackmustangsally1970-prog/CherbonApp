<!DOCTYPE html>
<html>
<head>
    <title>Weekly Summary — Admin</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background:#f5f5f5;
            padding:40px;
        }

        h2 {
            font-size:32px;
            margin-bottom:25px;
        }

        .week-range {
            font-size:20px;
            margin-bottom:30px;
            color:#444;
        }

        .entry {
            background:white;
            padding:20px;
            margin-bottom:15px;
            border-radius:10px;
            box-shadow:0 3px 10px rgba(0,0,0,0.15);
            display:flex;
            justify-content:space-between;
            align-items:center;
        }

        .name {
            font-size:22px;
            font-weight:bold;
        }

        .hours {
            font-size:20px;
            color:#2a7ae2;
            font-weight:bold;
        }

        .back-btn {
            padding:18px;
            background:#777;
            color:white;
            border:none;
            border-radius:10px;
            font-size:22px;
            margin-top:30px;
            width:260px;
            cursor:pointer;
        }

        .back-btn:hover {
            background:#555;
        }
    </style>
</head>
<body>

<h2>Weekly Summary</h2>

<div class="week-range">
    {{ start_of_week.strftime('%A %d %B %Y') }} → {{ end_of_week.strftime('%A %d %B %Y') }}

</div>

{% for emp, total in summary %}
    <div class="entry">
        <div class="name">
            {{ emp.full_name }}
        </div>

        <div class="hours">
            {{ "%.2f"|format(total) }} hrs
        </div>
    </div>
{% endfor %}

<button class="back-btn" onclick="window.location.href='/admin'">
    Back to Admin
</button>

</body>
</html>
