<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Edit Employee — Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">
<div class="container py-5" style="max-width: 500px;">

    <h2 class="text-center mb-4">Edit Employee</h2>

    <div class="card shadow-sm">
        <div class="card-body">

            <form method="POST" action="/admin/employees/{{ emp.id }}/edit">

                <div class="mb-3">
                    <label class="form-label">Full Name</label>
                    <input type="text"
                           name="full_name"
                           class="form-control form-control-lg"
                           value="{{ emp.full_name }}"
                           required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Phone Number</label>
                    <input type="text"
                           name="phone"
                           class="form-control form-control-lg"
                           value="{{ emp.phone or '' }}"
                           required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Role</label>
                    <input type="text"
                           name="role"
                           class="form-control form-control-lg"
                           value="{{ emp.role or '' }}">
                </div>

<div class="mb-3">
    <label class="form-label">Categories</label>

    <select name="categories" class="form-select" multiple size="5">
        <option value="wedding_staff"
            {% if emp.categories and 'wedding_staff' in emp.categories %}selected{% endif %}>
            Wedding Staff
        </option>

        <option value="wedding_coordinator"
            {% if emp.categories and 'wedding_coordinator' in emp.categories %}selected{% endif %}>
            Wedding Coordinator
        </option>

        <option value="equestrian_teacher"
            {% if emp.categories and 'equestrian_teacher' in emp.categories %}selected{% endif %}>
            Equestrian Teacher
        </option>

        <option value="equestrian_strapper"
            {% if emp.categories and 'equestrian_strapper' in emp.categories %}selected{% endif %}>
            Equestrian Strapper
        </option>

        <option value="admin"
            {% if emp.categories and 'admin' in emp.categories %}selected{% endif %}>
            Admin
        </option>
    </select>

    <small class="text-muted">
        Hold CTRL to select multiple categories.
    </small>
</div>



                <div class="form-check mb-3">
                    <input class="form-check-input"
                           type="checkbox"
                           name="active"
                           id="activeCheck"
                           {% if emp.active %}checked{% endif %}>
                    <label class="form-check-label" for="activeCheck">
                        Active
                    </label>
                </div>

                <button class="btn btn-primary w-100 btn-lg mt-3">
                    Save Changes
                </button>

            </form>

            <form method="POST"
                  action="/admin/employees/{{ emp.id }}/delete"
                  onsubmit="return confirm('Delete this employee? This cannot be undone.');">

                <button class="btn btn-danger w-100 btn-lg mt-3">
                    Delete Employee
                </button>

            </form>

            <button class="btn btn-secondary w-100 btn-lg mt-3"
                    onclick="window.location.href='/admin/employees'">
                Back to Employees
            </button>

        </div>
    </div>

</div>
</body>
</html>
