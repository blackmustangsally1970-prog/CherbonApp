<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Edit Employee — Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">
<div class="container py-5" style="max-width: 500px;">

    <h2 class="text-center mb-4">Edit Employee</h2>

    <div class="card shadow-sm">
        <div class="card-body">

            <form method="POST" action="/admin/employees/{{ emp.id }}/edit">

                <div class="mb-3">
                    <label class="form-label">Full Name</label>
                    <input type="text"
                           name="full_name"
                           class="form-control form-control-lg"
                           value="{{ emp.full_name }}"
                           required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Phone Number</label>
                    <input type="text"
                           name="phone"
                           class="form-control form-control-lg"
                           value="{{ emp.phone or '' }}"
                           required>
                </div>

                <div class="mb-3">
                    <label class="form-label">New PIN (optional)</label>
                    <input type="password"
                           name="pin"
                           class="form-control form-control-lg"
                           maxlength="6"
                           pattern="[0-9]{6}"
                           placeholder="Leave blank to keep current">
                </div>

                <button class="btn btn-primary w-100 btn-lg mt-3">
                    Save Changes
                </button>

            </form>

            <form method="POST"
                  action="/admin/employee/{{ emp.id }}/delete"
                  onsubmit="return confirm('Delete this employee? This cannot be undone.');">

                <button class="btn btn-danger w-100 btn-lg mt-3">
                    Delete Employee
                </button>

            </form>

            <button class="btn btn-secondary w-100 btn-lg mt-3"
                    onclick="window.location.href='/admin/employees'">
                Back to Employees
            </button>

        </div>
    </div>

</div>
</body>
</html>
