<!DOCTYPE html>
<html>
<head>
    <title>Edit Hours — {{ emp.full_name }}</title>
    <style>
        body {
            font-family: Arial;
            background:#f5f5f5;
            padding:40px;
        }
        h2 {
            font-size:32px;
            margin-bottom:25px;
        }
        label {
            font-size:20px;
            display:block;
            margin-top:20px;
        }
        input {
            width:100%;
            padding:14px;
            font-size:20px;
            border-radius:8px;
            border:1px solid #ccc;
            margin-top:8px;
        }
        .save-btn {
            margin-top:30px;
            padding:20px;
            background:#2a7ae2;
            color:white;
            border:none;
            border-radius:10px;
            font-size:24px;
            width:100%;
            cursor:pointer;
        }
        .save-btn:hover {
            background:#1f5fb4;
        }
        .back-btn {
            margin-top:20px;
            padding:18px;
            background:#777;
            color:white;
            border:none;
            border-radius:10px;
            font-size:22px;
            width:100%;
            cursor:pointer;
        }
        .back-btn:hover {
            background:#555;
        }
    </style>
</head>
<body>

<h2>Edit Hours — {{ emp.full_name }}<br>
<span style="font-size:22px;">{{ row.date.strftime('%A %d %B %Y') }}</span>
</h2>

<form method="POST">

    <label>Start Work</label>
    <input type="datetime-local" name="sign_in"
           value="{{ row.sign_in.strftime('%Y-%m-%dT%H:%M') if row.sign_in else '' }}">

    <label>Break Start</label>
    <input type="datetime-local" name="break_start"
           value="{{ row.break_start.strftime('%Y-%m-%dT%H:%M') if row.break_start else '' }}">

    <label>Break End</label>
    <input type="datetime-local" name="break_end"
           value="{{ row.break_end.strftime('%Y-%m-%dT%H:%M') if row.break_end else '' }}">

    <label>Finish Work</label>
    <input type="datetime-local" name="sign_out"
           value="{{ row.sign_out.strftime('%Y-%m-%dT%H:%M') if row.sign_out else '' }}">

    <button class="save-btn">Save Changes</button>
</form>

<button class="back-btn"
        onclick="window.location.href='/admin/employee/{{ emp.id }}/hours'">
    Back
</button>

</body>
</html>
