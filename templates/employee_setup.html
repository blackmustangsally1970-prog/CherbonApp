<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Set Your PIN</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container py-5" style="max-width: 460px;">

    <h2 class="text-center mb-4">Set Your PIN</h2>

    <p class="text-muted text-center mb-4">
        Welcome {{ emp.full_name }}.<br>
        Please create your 6‑digit PIN.
    </p>

    <form method="POST">
        <input type="hidden" name="code" value="{{ code }}">

        <div class="mb-3">
            <label class="form-label">PIN</label>
            <input type="password"
                   name="pin"
                   class="form-control form-control-lg"
                   maxlength="6"
                   pattern="[0-9]{6}"
                   required>
        </div>

        <div class="mb-3">
            <label class="form-label">Confirm PIN</label>
            <input type="password"
                   name="confirm"
                   class="form-control form-control-lg"
                   maxlength="6"
                   pattern="[0-9]{6}"
                   required>
        </div>

        <button class="btn btn-success w-100 btn-lg">Save PIN</button>
    </form>

</div>
</body>
</html>
