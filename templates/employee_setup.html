<!DOCTYPE html>
<html>
<head>
    <title>Employee Setup</title>
    <style>
        body { font-family: Arial; background:#f5f5f5; padding:40px; text-align:center; }
        .box { background:white; padding:30px; max-width:400px; margin:auto; border-radius:8px; }
        input { width:100%; padding:12px; margin:10px 0; font-size:18px; }
        button { width:100%; padding:14px; background:#2a7ae2; color:white; border:none; font-size:20px; border-radius:6px; cursor:pointer; }
        button:hover { background:#1f5fb4; }
        .error { color:red; margin-top:10px; }
        .success { color:green; margin-top:10px; }
    </style>
</head>
<body>

<div class="box">
    <h2>Employee Setup</h2>

    <input id="setup_code" placeholder="Setup Code">
    <input id="pin" placeholder="Choose PIN (4–6 digits)" type="password">

    <button onclick="submitSetup()">Save PIN</button>

    <div id="msg"></div>
</div>

<script>
function submitSetup() {
    fetch("/employee/setup", {
        method: "POST",
        body: new URLSearchParams({
            setup_code: document.getElementById("setup_code").value,
            pin: document.getElementById("pin").value
        })
    })
    .then(r => r.json())
    .then(d => {
        if (d.status === "ok") {
            document.getElementById("msg").innerHTML = "<div class='success'>Setup complete. You can now log in.</div>";
            setTimeout(() => window.location = "/employeehours", 1500);
        } else {
            document.getElementById("msg").innerHTML = "<div class='error'>" + d + "</div>";
        }
    });
}
</script>

</body>
</html>
