<!DOCTYPE html>
<html>
<head>
    <title>Logged Out</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background:#f5f5f5;
            padding:40px;
            text-align:center;
        }

        .box {
            background:white;
            padding:40px;
            max-width:450px;
            margin:0 auto;
            border-radius:12px;
            box-shadow:0 3px 10px rgba(0,0,0,0.15);
        }

        h2 {
            font-size:32px;
            margin-bottom:20px;
        }

        p {
            font-size:20px;
            margin-bottom:30px;
            color:#444;
        }

        .login-btn {
            padding:15px 25px;
            background:#2a7ae2;
            color:white;
            border:none;
            border-radius:8px;
            font-size:20px;
            cursor:pointer;
            width:260px;
        }

        .login-btn:hover {
            background:#1f5fb4;
        }

        .home-btn {
            margin-top:20px;
            padding:15px 25px;
            background:#777;
            color:white;
            border:none;
            border-radius:8px;
            font-size:20px;
            cursor:pointer;
            width:260px;
        }

        .home-btn:hover {
            background:#555;
        }
    </style>
</head>
<body>

<div class="box">
    <h2>You’ve Been Logged Out</h2>
    <p>Thank you. Your session has ended.</p>

    <button class="login-btn" onclick="window.location.href='/employeehours'">
        Log In Again
    </button>

    <button class="home-btn" onclick="window.location.href='/'">
        Return Home
    </button>
</div>

</body>
</html>
