<!doctype html>
<html>
<head>
    <meta charset="utf-8">
    <title>Manage Wedding Staff</title>

    <style>
        body { font-family: sans-serif; padding: 20px; }
        h1 { margin-bottom: 20px; }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 20px;
        }

        th, td {
            padding: 10px;
            border-bottom: 1px solid #ccc;
            text-align: left;
        }

        .menu-btn {
            padding: 8px 14px;
            background: #0645AD;
            color: white;
            text-decoration: none;
            border-radius: 4px;
            margin-right: 6px;
        }

        .menu-btn:hover { background: #003f8a; }

        .small-btn {
            padding: 6px 10px;
            background: #444;
            color: white;
            border-radius: 4px;
            text-decoration: none;
            font-size: 0.9em;
        }

        .small-btn:hover { background: #222; }

        .danger {
            background: #b30000;
        }

        .danger:hover {
            background: #7a0000;
        }
    </style>
</head>
<body>

<a href="{{ url_for('wedding_staffing') }}" class="menu-btn">← Back</a>

<h1>Manage Wedding Staff</h1>

<table>
    <tr>
        <th>Name</th>
        <th>Actions</th>
    </tr>

    {% for s in staff %}
    <tr>
        <td>{{ s.name }}</td>
        <td>
            <a href="#" class="small-btn danger">Delete</a>
        </td>
    </tr>
    {% endfor %}
</table>

<form method="post" action="#">
    <input type="text" name="name" placeholder="New staff name">
    <button class="small-btn">Add</button>
</form>

</body>
</html>
