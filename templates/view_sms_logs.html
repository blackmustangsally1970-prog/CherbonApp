    <!DOCTYPE html>
    <html>
    <head>
        <meta charset="utf-8">
        <title>SMS Logs</title>
        <style>
            body { font-family: sans-serif; padding: 20px; }
            table { width: 100%; border-collapse: collapse; margin-top: 20px; }
            th, td { padding: 8px; border-bottom: 1px solid #ccc; }
            th { background: #f0f0f0; text-align: left; }
        </style>
    </head>

    <body>

        <h2>SMS Logs</h2>
        <a href="{{ url_for('dashboard') }}">← Back to Admin Menu</a>

        <table>
            <tr>
                <th>Sent At</th>
                <th>Mobile</th>
                <th>Rider Name</th>
                <th>Message</th>
            </tr>

            {% for log in logs %}
            <tr>
                <td>{{ log.sent_at.strftime('%Y-%m-%d %H:%M:%S') }}</td>
                <td>{{ log.mobile }}</td>
                <td>{{ log.rider_name or '' }}</td>
                <td>{{ log.message_body }}</td>
            </tr>
            {% endfor %}
        </table>

    </body>
    </html>
