<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Employees</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container py-4">

    <h2 class="mb-4">Employees</h2>

    <a href="{{ url_for('admin_add_employee') }}" class="btn btn-primary mb-3">
        + Add Employee
    </a>

    <table class="table table-striped table-hover align-middle">
        <thead class="table-dark">
            <tr>
                <th>Name</th>
                <th>Phone</th>
                <th>Role</th>
                <th>Status</th>
                <th style="width: 260px;">Actions</th>
            </tr>
        </thead>

        <tbody>
            {% for emp in employees %}
            <tr>
                <td>{{ emp.full_name }}</td>
                <td>{{ emp.phone or "-" }}</td>
                <td>{{ emp.role or "-" }}</td>

                <td>
                    {% if emp.active %}
                        <span class="badge bg-success">Active</span>
                    {% else %}
                        <span class="badge bg-secondary">Inactive</span>
                    {% endif %}
                </td>

                <td>
                    <a href="{{ url_for('admin_edit_employee', emp_id=emp.id) }}"
                       class="btn btn-sm btn-outline-primary">
                        Edit
                    </a>

                    <form action="{{ url_for('admin_reset_pin', emp_id=emp.id) }}"
                          method="POST" style="display:inline;">
                        <button class="btn btn-sm btn-warning">
                            Reset PIN
                        </button>
                    </form>

                    <form action="{{ url_for('admin_delete_employee', emp_id=emp.id) }}"
                          method="POST" style="display:inline;"
                          onsubmit="return confirm('Deactivate this employee?');">
                        <button class="btn btn-sm btn-danger">
                            Deactivate
                        </button>
                    </form>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>

</div>
</body>
</html>
