<!DOCTYPE html>
<html>
<head>
    <title>Employees</title>
    <style>
        body { font-family: Arial; background:#f5f5f5; padding:40px; }
        h2 { text-align:center; }
        table { width:100%; border-collapse:collapse; margin-top:20px; background:white; }
        th, td { padding:12px; border-bottom:1px solid #ddd; text-align:left; }
        th { background:#eee; }
        .btn { padding:8px 14px; border:none; border-radius:4px; cursor:pointer; }
        .add { background:#2a7ae2; color:white; }
        .add:hover { background:#1f5fb4; }
        .deact { background:#e74c3c; color:white; }
        .deact:hover { background:#c0392b; }
        .code { font-family: monospace; }
        .form-box { background:white; padding:20px; border-radius:6px; max-width:400px; margin:20px auto; }
        input { width:100%; padding:10px; margin:8px 0; font-size:16px; }
    </style>
</head>
<body>

<a href="{{ url_for('employees_home') }}" class="menu-btn-small">← Employees Menu</a>


<h2>Employee Management</h2>

<div class="form-box">
    <h3>Add Employee</h3>
    <input id="full_name" placeholder="Full Name">
    <button class="btn add" onclick="addEmployee()">Create Employee</button>
    <div id="msg"></div>
</div>

<table>
    <tr>
        <th>Name</th>
        <th>Setup Code</th>
        <th>Active</th>
        <th>Actions</th>
    </tr>

    {% for e in employees %}
    <tr>
        <td>{{ e.full_name }}</td>
        <td class="code">
            {% if e.setup_code %}
                {{ e.setup_code }}
            {% else %}
                —
            {% endif %}
        </td>
        <td>{{ "Yes" if e.active else "No" }}</td>
        <td>
            {% if e.active %}
                <button class="reset-pin-btn" data-id="{{ e.id }}">Reset PIN</button>
                <button class="btn deact" onclick="deactivate({{ e.id }})">Deactivate</button>
            {% else %}
                —
            {% endif %}
        </td>
    </tr>
    {% endfor %}
</table>

<script>
function addEmployee() {
    fetch("/admin/employees/new", {
        method: "POST",
        body: new URLSearchParams({
            full_name: document.getElementById("full_name").value
        })
    })
    .then(r => r.json())
    .then(d => {
        if (d.status === "ok") {
            document.getElementById("msg").innerHTML = 
                "<div style='color:green'>Employee created. Setup code: " + d.setup_code + "</div>";
            setTimeout(() => location.reload(), 1200);
        } else {
            document.getElementById("msg").innerHTML = 
                "<div style='color:red'>Error: " + d + "</div>";
        }
    });
}

function deactivate(id) {
    fetch("/admin/employees/deactivate/" + id, { method:"POST" })
        .then(() => location.reload());
}
</script>

<script>
    document.querySelectorAll(".reset-pin-btn").forEach(btn => {
        btn.addEventListener("click", () => {
            const id = btn.dataset.id;

            if (!confirm("Reset this employee's PIN? They will receive a new setup link.")) {
                return;
            }

            fetch(`/admin/reset_pin/${id}`, {
                method: "POST"
            })
            .then(r => r.json())
            .then(data => {
                if (data.error) {
                    alert("Error: " + data.error);
                    return;
                }

                alert(
                    "PIN Reset for: " + data.employee + "\n\n" +
                    "Send them this link:\n" + data.reset_link
                );
            })
            .catch(err => {
                alert("Unexpected error resetting PIN.");
            });
        });
    });
</script>



</body>
</html>
