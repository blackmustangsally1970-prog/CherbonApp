<!DOCTYPE html>
<html>
<head>
    <title>Employees — Admin</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background:#f5f5f5;
            padding:40px;
            text-align:center;
        }

        h2 {
            font-size:36px;
            margin-bottom:35px;
        }

        .list {
            max-width:600px;
            margin:0 auto;
            display:flex;
            flex-direction:column;
            gap:20px;
        }

        .entry {
            background:white;
            padding:20px;
            border-radius:12px;
            box-shadow:0 3px 10px rgba(0,0,0,0.15);
            display:flex;
            justify-content:space-between;
            align-items:center;
        }

        .name {
            font-size:22px;
            font-weight:bold;
        }

        .btn {
            padding:14px 22px;
            background:#2a7ae2;
            color:white;
            border:none;
            border-radius:8px;
            font-size:18px;
            cursor:pointer;
        }

        .btn:hover {
            background:#1f5fb4;
        }

        .add-btn {
            margin-top:40px;
            padding:18px;
            background:#4caf50;
            color:white;
            border:none;
            border-radius:10px;
            font-size:22px;
            width:260px;
            cursor:pointer;
        }

        .add-btn:hover {
            background:#3e8e41;
        }

        .back-btn {
            margin-top:20px;
            padding:18px;
            background:#777;
            color:white;
            border:none;
            border-radius:10px;
            font-size:22px;
            width:260px;
            cursor:pointer;
        }

        .back-btn:hover {
            background:#555;
        }
    </style>
</head>
<body>

<h2>Employees</h2>

<div class="list">

    {% for emp in employees %}
        <div class="entry">
            <div class="name">{{ emp.full_name }}</div>

            <button class="btn"
                    onclick="window.location.href='/admin/employee/{{ emp.id }}/hours'">
                View Hours
            </button>
        </div>
    {% endfor %}

</div>

<button class="add-btn" onclick="window.location.href='/admin/employees/add'">
    Add New Employee
</button>

<button class="back-btn" onclick="window.location.href='/admin'">
    Back to Admin
</button>

</body>
</html>
