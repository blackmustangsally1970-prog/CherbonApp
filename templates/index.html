      line-height: 1.35;

    }

    .menu-btn:hover {
      background: #c7d6ff;
      transform: scale(1.04);
      text-decoration: none;
    }

    @media (min-width: 800px) {
      .menu-btn {
        padding: 20px 18px !important;
        font-size: 20px !important;
        border-radius: 10px !important;
