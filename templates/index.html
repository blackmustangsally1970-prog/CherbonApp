<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Equestrian Menu</title>
  <style>

    body { font-family: sans-serif; padding: 20px; }
    h1 { margin-bottom: 20px; }
    ul.menu { list-style: none; padding: 0; }
    ul.menu > li { margin-bottom: 12px; }
    ul.submenu {
      list-style: none;
      padding-left: 24px;   /* extra indent for offset */
      font-size: 0.9em;     /* slightly smaller font */
      color: #555;          /* lighter text color */
    }
    ul.submenu a {
      color: #555;          /* lighter link color */
    }
    ul.submenu a:hover {
      color: #0645AD;       /* highlight on hover */
      text-decoration: underline;
    }
    a { text-decoration: none; color: #0645AD; }
    a:hover { text-decoration: underline; }


/* SUPER MASSIVE iPhone menu buttons */
.menu-btn {
  display: block;
  width: 100%;
  background: #dce6ff;
  border: 4px solid #4a6bff;
  padding: 40px 28px;              /* TRIPLE HEIGHT */
  border-radius: 18px;
  font-size: 34px;                 /* TRIPLE FONT SIZE */
  font-weight: 900;                /* SUPER BOLD */
  color: #001a66;
  text-decoration: none;
  text-align: center;
  box-sizing: border-box;
  margin-bottom: 28px;             /* big spacing between tiles */
  letter-spacing: 1px;
  line-height: 1.35;
  transition: background 0.2s ease, transform 0.1s ease;
}

.menu-btn:hover {
  background: #c7d6ff;
  transform: scale(1.04);
  text-decoration: none;
}



ul.submenu a {
  font-size: 16px;
  padding: 6px 0;
  display: block;
}


/* Keep submenu links simple */
ul.submenu {
  list-style: none;
  padding-left: 24px;
  font-size: 0.9em;
  color: #555;
}

ul.submenu a {
  color: #555;
}

ul.submenu a:hover {
  color: #0645AD;
  text-decoration: underline;
}

/* Space between menu items */
ul.menu > li {
  margin-bottom: 16px;
}

/* Desktop / large-screen override */
@media (min-width: 800px) {
  .menu-btn {
    padding: 20px 18px !important;   /* half the height */
    font-size: 20px !important;      /* half the font size */
    border-radius: 10px !important;
    margin-bottom: 16px !important;
  }
}





  </style>
</head>
<body>
<h1>Equestrian Admin Menu</h1>

<ul class="menu">

<li>
  <a href="{{ url_for('lessons_by_date') }}" class="menu-btn">📅 View Lessons by Date</a>
</li>

<li>
  <a href="{{ url_for('client_view') }}" class="menu-btn">👤 Client View</a>
</li>

<li>
  <a href="{{ url_for('notifications') }}" class="menu-btn">📥 Disclaimers</a>
</li>

<li>
  <a href="{{ url_for('minus_balances_page') }}" class="menu-btn">💸 Minus Balances</a>
</li>

<li>
  <a href="{{ url_for('pending_lessons') }}" class="menu-btn">⏳ Lessons Pending</a>
</li>

<li>
  <a href="{{ url_for('messages_menu') }}" class="menu-btn">✉️ Messages</a>
</li>

<li>
  <a href="{{ url_for('other_tools') }}" class="menu-btn">🧰 Other Tools</a>
</li>

<li>
  <a href="{{ url_for('debug_page') }}" class="menu-btn">🛠️ Debug Tools</a>
</li>

<li>
  <a href="{{ url_for('summaries_page') }}" class="menu-btn">📊 Summaries</a>
</li>





</ul>

</body>
</html>
