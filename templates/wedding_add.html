<!DOCTYPE html>
<html>
<head>
    <title>Add Wedding</title>
    <link rel="stylesheet" href="/static/bootstrap.min.css">
</head>

<body>

<div class="container" style="margin-top:30px;">

    <h3>Add New Wedding</h3>
    <hr>

    <form action="/admin/wedding/add" method="POST">

        <div class="form-group">
            <label>Bride Name</label>
            <input type="text" name="bride_name" class="form-control" required>
        </div>

        <div class="form-group" style="margin-top:10px;">
            <label>Groom Name</label>
            <input type="text" name="groom_name" class="form-control" required>
        </div>

        <div class="form-group" style="margin-top:10px;">
            <label>Wedding Date</label>
            <input type="date" name="wedding_date" class="form-control" required>
        </div>

        <button class="btn btn-primary" style="margin-top:15px;">Create Wedding</button>
        <a href="/admin/weddings" class="btn btn-secondary" style="margin-top:15px;">Back</a>

    </form>

</div>

</body>
</html>
