<!doctype html>
<html>
<head>
    <meta charset="utf-8">
    <title>Edit Wedding Staffing</title>

    <style>
        body { font-family: sans-serif; padding: 20px; }
        h1 { margin-bottom: 20px; }

        .menu-btn {
            padding: 8px 14px;
            background: #0645AD;
            color: white;
            text-decoration: none;
            border-radius: 4px;
            margin-right: 6px;
        }

        .menu-btn:hover { background: #003f8a; }

        .save-btn {
            padding: 10px 16px;
            background: green;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }

        .save-btn:hover { background: #0a6f0a; }

        label { font-weight: bold; display: block; margin-top: 15px; }
    </style>
</head>
<body>

<a href="{{ url_for('wedding_staffing') }}" class="menu-btn">← Back</a>
<a href="{{ url_for('manage_wedding_staff') }}" class="menu-btn">👥 Manage Staff</a>

<h1>Edit Staffing for {{ wedding.couple_name }}</h1>
<p><strong>Date:</strong> {{ wedding.date }}</p>

<form method="post">

    <label>Assign Staff</label>
    <select name="staff_ids" multiple size="10" style="width: 300px;">
        {% for s in staff_list %}
            <option value="{{ s.id }}"
                {% if s.id in assigned_ids %}selected{% endif %}>
                {{ s.name }}
            </option>
        {% endfor %}
    </select>

    <br><br>

    <button class="save-btn">Save Changes</button>
</form>

</body>
</html>
