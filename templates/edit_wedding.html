<!doctype html>
<html>
<head>
    <meta charset="utf-8">
    <title>Edit Wedding</title>

    <style>
        body { font-family: sans-serif; padding: 20px; }
        label { font-weight: bold; display: block; margin-top: 12px; }
        input, textarea {
            width: 300px;
            padding: 6px;
            margin-top: 4px;
        }
        .menu-btn {
            padding: 8px 14px;
            background: #0645AD;
            color: white;
            text-decoration: none;
            border-radius: 4px;
            margin-right: 6px;
        }
        .menu-btn:hover { background: #003f8a; }
        .save-btn {
            margin-top: 20px;
            padding: 10px 16px;
            background: green;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        .save-btn:hover { background: #0a6f0a; }
        .notes-box {
            width: 300px;
            height: 100px;
        }
    </style>
</head>
<body>

<a href="{{ url_for('wedding_staffing') }}" class="menu-btn">← Back</a>

<h1>Edit Wedding</h1>

<form method="post">

    <label>Date</label>
    <input type="date" name="date" value="{{ wedding.date }}" required>

<label>Type</label>
<select name="category" style="width: 150px; padding: 6px; margin-top: 4px;">
    <option value="WR" {% if wedding.category == 'WR' %}selected{% endif %}>WR</option>
    <option value="IND" {% if wedding.category == 'IND' %}selected{% endif %}>IND</option>
    <option value="CO" {% if wedding.category == 'CO' %}selected{% endif %}>CO</option>
</select>

    <label>Pax</label>
    <input type="number" name="pax" value="{{ wedding.pax or '' }}" min="0" style="width: 120px;">

    <label>Time (overall event time)</label>
    <input type="text" name="time" value="{{ wedding.time or '' }}" placeholder="e.g. 12:30 – 5:30" style="width: 200px;">

    <label>1st Service</label>
    <input type="text" name="service1" value="{{ wedding.service1 or '' }}" placeholder="e.g. 1:00pm – 2:00pm" style="width: 220px;">

    <label>Notes</label>
    <textarea name="notes" class="notes-box">{{ wedding.notes }}</textarea>

    <button class="save-btn">Save Changes</button>
</form>

</body>
</html>
