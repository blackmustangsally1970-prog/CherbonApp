    <h2>Upload Receipt</h2>

    <form method="POST" enctype="multipart/form-data">

        <label>Take Photo:</label><br>
        <input type="file"
               name="photo"
               accept="image/*"
               capture="camera"
               required>

        <br><br>

        <label>Notes (optional):</label><br>
        <textarea name="notes"
                  rows="3"
                  style="width:100%;"></textarea>

        <br><br>

        <button type="submit">Upload Receipt</button>
    </form>
