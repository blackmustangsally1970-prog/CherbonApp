<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Courses Menu</title>

    <style>
        body {
            font-family: sans-serif;
            padding: 20px;
        }

        h2 {
            margin-bottom: 20px;
        }

        ul.menu {
            list-style: none;
            padding: 0;
        }

        ul.menu > li {
            margin-bottom: 16px;
        }

        /* SUPER MASSIVE iPhone menu buttons */
        .menu-btn {
            display: block;
            width: 100%;
            background: #dce6ff;
            border: 4px solid #4a6bff;
            padding: 40px 28px;
            border-radius: 18px;
            font-size: 34px;
            font-weight: 900;
            color: #001a66;
            text-decoration: none;
            text-align: center;
            box-sizing: border-box;
            margin-bottom: 28px;
            letter-spacing: 1px;
            line-height: 1.35;
            transition: background 0.2s ease, transform 0.1s ease;
        }

        .menu-btn:hover {
            background: #c7d6ff;
            transform: scale(1.04);
            text-decoration: none;
        }

        /* Desktop override */
        @media (min-width: 800px) {
            .menu-btn {
                padding: 20px 18px !important;
                font-size: 20px !important;
                border-radius: 10px !important;
                margin-bottom: 16px !important;
            }
        }
    </style>
</head>

<body>

<h2>Courses</h2>

<ul class="menu">

    <li>
        <a href="{{ url_for('dashboard') }}" class="menu-btn">← Back to Main Menu</a>
    </li>

    <li>
        <a href="{{ url_for('course_form_submissions') }}" class="menu-btn">📥 Course Submissions</a>

    </li>

    <li>
        <a href="{{ url_for('course_reference') }}" class="menu-btn">📘 Course Reference Table</a>
    </li>

    <li>
        <a href="{{ url_for('pricing_setup') }}" class="menu-btn">💲 Pricing Setup</a>
    </li>

    <li>
        <a href="{{ url_for('terms') }}" class="menu-btn">📅 Term Setup (4 Terms Per Year)</a>
    </li>

</ul>

</body>
</html>
