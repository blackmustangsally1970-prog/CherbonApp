<!DOCTYPE html>
<html>
<head>
    <title>Cancel Wedding</title>
    <link rel="stylesheet" href="/static/bootstrap.min.css">
</head>

<body>

<div class="container" style="margin-top:30px;">

    <h3>Cancel Wedding</h3>
    <p>Are you sure you want to cancel the wedding for {{ wedding.bride_name }} & {{ wedding.groom_name }}?</p>

    <form action="/admin/wedding/{{ wedding.id }}/cancel" method="POST">

        <div class="form-group">
            <label>Reason (optional)</label>
            <textarea name="cancel_reason" class="form-control"></textarea>
        </div>

        <button class="btn btn-danger" style="margin-top:15px;">Confirm Cancel</button>
        <a href="/admin/wedding/{{ wedding.id }}" class="btn btn-secondary" style="margin-top:15px;">Back</a>

    </form>

</div>

</body>
</html>
