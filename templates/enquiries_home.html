<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Enquiries</title>

  <style>

    body {
      font-family: sans-serif;
      padding: 20px;
    }

    /* SMALL BLUE BUTTON (same as General Enquiries) */
    .menu-btn-small {
        display:inline-block;
        padding:10px 15px;
        background:#007bff;
        color:white;
        border-radius:6px;
        text-decoration:none;
        margin-right:10px;
        font-size:16px;
        font-weight:bold;
    }

    /* MASSIVE iPhone menu buttons (same as main menu) */
    .menu-btn {
      display: block;
      width: 100%;
      background: #dce6ff;
      border: 4px solid #4a6bff;
      padding: 40px 28px;
      border-radius: 18px;
      font-size: 34px;
      font-weight: 900;
      color: #001a66;
      text-decoration: none;
      text-align: center;
      box-sizing: border-box;
      margin-bottom: 28px;
      letter-spacing: 1px;
      line-height: 1.35;
      transition: background 0.2s ease, transform 0.1s ease;
    }

    .menu-btn:hover {
      background: #c7d6ff;
      transform: scale(1.04);
      text-decoration: none;
    }

    /* Desktop override */
    @media (min-width: 800px) {
      .menu-btn {
        padding: 20px 18px !important;
        font-size: 20px !important;
        border-radius: 10px !important;
        margin-bottom: 16px !important;
      }
    }

  </style>
</head>

<body>

  <!-- SMALL MAIN MENU BUTTON -->
  <div style="margin-bottom:12px;">
      <a href="{{ url_for('dashboard') }}" class="menu-btn-small">← Main Menu</a>
  </div>

  <h1>📨 Enquiries</h1>

  <!-- BIG CHERBON BUTTONS -->
  <ul class="menu">

    <li>
      <a href="{{ url_for('trailride_enquiries') }}" class="menu-btn">
        🐎 Trail Ride Enquiries
      </a>
    </li>

    <li>
      <a href="{{ url_for('general_enquiries') }}" class="menu-btn">
        📋 General Enquiries
      </a>
    </li>

  </ul>

</body>
</html>
