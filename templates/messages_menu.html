<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Messages Menu</title>
  <style>
    body { font-family: sans-serif; padding: 20px; }
    h1 { margin-bottom: 20px; }

    .menu-btn {
      display: block;
      width: 100%;
      background: #dce6ff;
      border: 4px solid #4a6bff;
      padding: 40px 28px;
      border-radius: 18px;
      font-size: 34px;
      font-weight: 900;
      color: #001a66;
      text-decoration: none;
      text-align: center;
      box-sizing: border-box;
      margin-bottom: 28px;
      letter-spacing: 1px;
      line-height: 1.35;
      transition: background 0.2s ease, transform 0.1s ease;
    }

    .menu-btn:hover {
      background: #c7d6ff;
      transform: scale(1.04);
      text-decoration: none;
    }

    @media (min-width: 800px) {
      .menu-btn {
        padding: 20px 18px !important;
        font-size: 20px !important;
        border-radius: 10px !important;
        margin-bottom: 16px !important;
      }
    }
  </style>
</head>
<body>

<h1>Messages</h1>

<a href="{{ url_for('wedding_sms') }}" class="menu-btn">💍 Wedding SMS Broadcast</a>
<a href="{{ url_for('equestrian_sms') }}" class="menu-btn">🐎 Equestrian SMS Broadcast</a>
<a href="{{ url_for('equestrian_bulk_sms') }}" class="menu-btn">📡 EQ Bulk Personalised SMS</a>

</body>
</html>
