<!-- BOOKING DETAILS (Trail Ride style, corrected schema) -->
<div style="
    border:1px solid #ddd;
    padding:12px;
    border-radius:6px;
    margin-bottom:16px;
    background:#f9f9f9;
">
    <div style="font-weight:bold; margin-bottom:8px;">
        Booking Details
    </div>

    <div style="display:flex; gap:12px; align-items:flex-end; flex-wrap:wrap;">

        <!-- DATE -->
        <div>
            <label>Date:</label><br>
            <input type="date"
                   name="booking_date_{{ e.id }}"
                   value="{{ current_date }}"
                   style="padding:4px; width:140px;">
        </div>

        <!-- TIME -->
        <div>
            <label>Time:</label><br>
            <select name="booking_time_{{ e.id }}"
                    class="form-select time-field searchable-dropdown"
                    style="width:140px;">
                <option value=""></option>
                {% for t in times %}
                    <option value="{{ t.timerange }}">{{ t.timerange }}</option>
                {% endfor %}
            </select>
        </div>

        <!-- LESSON TYPE -->
        <div>
            <label>Lesson Type:</label><br>
            <select name="lesson_type_{{ e.id }}"
                    style="padding:4px; width:160px;">
                <option value="Roundyard" selected>Roundyard</option>
                <option value="Arena">Arena</option>
                <option value="Trail Ride">Trail Ride</option>
                <option value="Party">Party</option>
            </select>
        </div>

        <!-- GROUP PRIV -->
        <div>
            <label>Group Priv:</label><br>
            <select name="gp_{{ e.id }}"
                    style="padding:4px; width:100px;">
                <option value="P" selected>P</option>
                <option value="SP1">SP1</option>
                <option value="SP2">SP2</option>
                <option value="SP3">SP3</option>
                <option value="SP4">SP4</option>
                <option value="G">G</option>
                <option value="GY">GY</option>
            </select>
        </div>

        <!-- PRICE -->
        <div>
            <label>Price (per rider):</label><br>
            <input type="number"
                   step="1.00"
                   name="price_per_rider_{{ e.id }}"
                   value="0.00"
                   style="padding:4px; width:90px;">
        </div>

        <!-- PAYMENT -->
        <div>
            <label>Payment (per rider):</label><br>
            <input type="number"
                   step="1.00"
                   name="payment_per_rider_{{ e.id }}"
                   value="0.00"
                   style="padding:4px; width:90px;">
        </div>

    </div>
</div>
