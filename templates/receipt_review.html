<h2>Receipt Review</h2>

<div style="margin-bottom: 20px; display:flex; gap:12px;">
    <a href="{{ url_for('dashboard') }}" class="menu-btn">← Main Menu</a>
</div>

<style>
#viewer-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    z-index: 9999;

    /* ALWAYS a flex container */
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;

    /* Hidden by default */
    visibility: hidden;
    opacity: 0;
    transition: opacity 0.2s ease;
}
</style>



<table border="1" cellpadding="6" cellspacing="0" style="width:100%; border-collapse:collapse;">
    <tr>
        <th>Image</th>
        <th>Notes</th>
        <th>Invoice Date</th>
        <th>Paid Date</th>
        <th>Reviewed</th>
        <th>Category</th>
        <th>Subfolder</th>
        <th>Actions</th>
    </tr>

    {% for r in receipts %}
    <tr>

        <!-- IMAGE WITH POPUP VIEWER -->
        <td>
            <img src="/static/{{ r.image_path }}"
                 onclick="openViewer('/static/{{ r.image_path }}')"
                 style="width:120px; border:1px solid #ccc; cursor:pointer;">
        </td>

        <!-- NOTES -->
        <td style="white-space:pre-wrap;">
            {{ r.notes }}
        </td>

        <!-- INVOICE DATE -->
        <td>
            <input type="date"
                   value="{{ r.invoice_date if r.invoice_date }}"
                   onchange="setInvoiceDate({{ r.id }}, this.value)">
        </td>

        <!-- PAID DATE -->
        <td>
            <input type="date"
                   value="{{ r.paid_date if r.paid_date }}"
                   onchange="setPaidDate({{ r.id }}, this.value)">
        </td>

        <!-- REVIEWED -->
        <td>
            <input type="checkbox"
                   onchange="markReviewed({{ r.id }}, this)"
                   {% if r.reviewed %}checked{% endif %}>
        </td>

        <!-- CATEGORY -->
        <td>
            <select onchange="setCategory({{ r.id }}, this.value)">
                <option value="">-- choose --</option>
                <option value="weddings"   {% if r.category == 'weddings' %}selected{% endif %}>Weddings</option>
                <option value="equestrian" {% if r.category == 'equestrian' %}selected{% endif %}>Equestrian</option>
            </select>
        </td>

        <!-- SUBFOLDER -->
        <td>
            {% if r.category %}
                <select onchange="setSubfolder({{ r.id }}, this.value)">
                    <option value="">-- choose --</option>

                    {% for f in subfolders[r.category] %}
                        <option value="{{ f }}" {% if r.subfolder == f %}selected{% endif %}>
                            {{ f }}
                        </option>
                    {% endfor %}

                    <option value="new">+ Create new</option>
                </select>
            {% else %}
                <span style="color:#888;">Select category first</span>
            {% endif %}
        </td>

        <!-- ACTIONS -->
        <td>
            <button onclick="deleteReceipt({{ r.id }})"
                    style="background:#b30000; color:white; padding:6px 10px; border:none; border-radius:4px; cursor:pointer;">
                Delete
            </button>
        </td>

    </tr>
    {% endfor %}
</table>


<!-- POPUP VIEWER -->
<div id="viewer-overlay"
     style="visibility:hidden; opacity:0; position:fixed; inset:0;
            background:rgba(0,0,0,0.85); z-index:9999;
            flex-direction:column; justify-content:center; align-items:center;
            transition:opacity 0.2s;">

    <img id="viewer-img" 
         style="max-width:90%; max-height:70%; transition:0.3s;">

    <div style="margin-top:20px; display:flex; gap:12px;">
        <button type="button"
                onclick="rotateViewer()"
                style="padding:10px 16px; font-size:16px;">
            Rotate
        </button>

        <button type="button"
                onclick="closeViewer()"
                style="padding:10px 16px; font-size:16px; background:#b30000; color:white;">
            Close
        </button>
    </div>
</div>

<script>
let viewerRotation = 0;

function openViewer(path) {
    const overlay = document.getElementById("viewer-overlay");
    const img = document.getElementById("viewer-img");

    img.src = path;
    viewerRotation = 0;
    img.style.transform = "rotate(0deg)";

    overlay.style.visibility = "visible";
    overlay.style.opacity = "1";
}

function closeViewer() {
    const overlay = document.getElementById("viewer-overlay");
    overlay.style.opacity = "0";
    setTimeout(() => overlay.style.visibility = "hidden", 200);
}

function rotateViewer() {
    const img = document.getElementById("viewer-img");
    viewerRotation = (viewerRotation + 90) % 360;
    img.style.transform = `rotate(${viewerRotation}deg)`;
}

/* EXISTING FUNCTIONS */
function markReviewed(id, checkbox) {
    fetch("/mark_receipt_reviewed", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ id: id, reviewed: checkbox.checked })
    })
    .then(r => r.json())
    .then(data => {
        if (data.status === "success") {
            const row = checkbox.closest("tr");
            row.style.transition = "opacity 0.4s ease";
            row.style.opacity = "0";
            setTimeout(() => row.remove(), 400);
        }
    });
}

function setInvoiceDate(id, date) {
    fetch("/set_invoice_date", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ id: id, invoice_date: date })
    });
}

function setPaidDate(id, date) {
    fetch("/set_paid_date", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ id: id, paid_date: date })
    });
}

function setCategory(id, category) {
    fetch("/set_receipt_category", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ id: id, category: category })
    })
    .then(r => r.json())
    .then(data => {
        if (data.status === "success") {
            location.reload();
        }
    });
}

function setSubfolder(id, folder) {
    if (folder === "new") {
        folder = prompt("Enter new subfolder name:");
        if (!folder) return;
    }

    fetch("/set_receipt_subfolder", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ id: id, folder: folder })
    })
    .then(r => r.json())
    .then(data => {
        if (data.status === "success") {
            location.reload();
        }
    });
}

function deleteReceipt(id) {
    if (!confirm("Are you sure you want to delete this receipt?")) return;

    fetch(`/delete_receipt/${id}`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ id: id })
    })
    .then(r => r.json())
    .then(data => {
        if (data.status === "success") {
            location.reload();
        } else {
            alert("Error deleting receipt.");
        }
    });
}
</script>
