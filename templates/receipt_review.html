<h2>Receipt Review</h2>

<!-- Main Menu Button -->
<div style="margin-bottom: 15px;">
    <a href="/menu" 
       style="padding:10px 16px; background:#444; color:white; text-decoration:none; border-radius:6px;">
        ⬅ Main Menu
    </a>
</div>

<table border="1" cellpadding="6" cellspacing="0" style="width:100%; border-collapse:collapse;">
<tr>
    <th>Image</th>
    <th>Staff</th>
    <th>Notes</th>
    <th>Date</th>
    <th>Reviewed</th>
    <th>Category</th>
    <th>Subfolder</th>
    <th>Actions</th>
</tr>

{% for r in receipts %}
<tr>
    <td>
        <a href="/static/{{ r.image_path }}" target="_blank">
            <img src="/static/{{ r.image_path }}" style="width:120px; border:1px solid #ccc;">
        </a>
    </td>

    <td>{{ r.staff.name }}</td>

    <td style="white-space:pre-wrap;">{{ r.notes }}</td>

    <td>{{ r.created_at.strftime("%d %b %Y %I:%M %p") }}</td>

    <td>
        <input type="checkbox"
               onchange="markReviewed({{ r.id }}, this.checked)"
               {% if r.reviewed %}checked{% endif %}>
    </td>

    <!-- CATEGORY DROPDOWN -->
    <td>
        <select onchange="setCategory({{ r.id }}, this.value)">
            <option value="">-- choose --</option>
            <option value="weddings" {% if r.category == 'weddings' %}selected{% endif %}>Weddings</option>
            <option value="equestrian" {% if r.category == 'equestrian' %}selected{% endif %}>Equestrian</option>
        </select>
    </td>

    <!-- SUBFOLDER DROPDOWN -->
    <td>
        {% if r.category %}
            <select onchange="setSubfolder({{ r.id }}, this.value)">
                <option value="">-- choose --</option>

                {% for f in subfolders[r.category] %}
                    <option value="{{ f }}" {% if r.subfolder == f %}selected{% endif %}>
                        {{ f }}
                    </option>
                {% endfor %}

                <option value="new">+ Create new</option>
            </select>
        {% else %}
            <span style="color:#888;">Select category first</span>
        {% endif %}
    </td>

    <td>
        <button onclick="deleteReceipt({{ r.id }})"
                style="background:#b30000; color:white; padding:6px 10px; border:none; border-radius:4px; cursor:pointer;">
            Delete
        </button>
    </td>
</tr>
{% endfor %}
</table>

<script>
function markReviewed(id, state) {
    fetch("/mark_receipt_reviewed", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ id: id, reviewed: state })
    });
}

function deleteReceipt(id) {
    if (!confirm("Are you sure you want to delete this receipt?")) return;

    fetch(`/delete_receipt/${id}`, {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ id: id })
    })
    .then(r => r.json())
    .then(data => {
        if (data.status === "success") location.reload();
        else alert("Error deleting receipt.");
    });
}

function setCategory(id, category) {
    fetch("/set_receipt_category", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ id: id, category: category })
    })
    .then(r => r.json())
    .then(data => {
        if (data.status === "success") location.reload();
        else alert("Error saving category.");
    });
}

function setSubfolder(id, folder) {
    if (folder === "new") {
        folder = prompt("Enter new subfolder name:");
        if (!folder) return;
    }

    fetch("/set_receipt_subfolder", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ id: id, folder: folder })
    })
    .then(r => r.json())
    .then(data => {
        if (data.status === "success") location.reload();
        else alert("Error saving subfolder.");
    });
}
</script>
