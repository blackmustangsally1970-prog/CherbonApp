<h2>Receipt Review</h2>

<div style="margin-bottom: 20px; display:flex; gap:12px;">
    <a href="{{ url_for('dashboard') }}" class="menu-btn">← Main Menu</a>
</div>

<table border="1" cellpadding="6" cellspacing="0" style="width:100%; border-collapse:collapse;">
<tr>
    <th>Image</th>
    <th>Notes</th>
    <th>Invoice Date</th>
    <th>Paid Date</th>
    <th>Reviewed</th>
    <th>Category</th>
    <th>Subfolder</th>
    <th>Actions</th>
</tr>

{% for r in receipts %}
<tr>
    <td>
        <a href="/static/{{ r.image_path }}" target="_blank">
            <img src="/static/{{ r.image_path }}" style="width:120px; border:1px solid #ccc;">
        </a>
    </td>

    <td style="white-space:pre-wrap;">{{ r.notes }}</td>

    <!-- INVOICE DATE -->
    <td>
        <input type="date"
               value="{{ r.invoice_date if r.invoice_date }}"
               onchange="setInvoiceDate({{ r.id }}, this.value)">
    </td>

    <!-- PAID DATE -->
    <td>
        <input type="date"
               value="{{ r.paid_date if r.paid_date }}"
               onchange="setPaidDate({{ r.id }}, this.value)">
    </td>

    <!-- REVIEWED -->
    <td>
        <input type="checkbox"
               onchange="markReviewed({{ r.id }}, this)"
               {% if r.reviewed %}checked{% endif %}>
    </td>

    <!-- CATEGORY -->
    <td>
        <select onchange="setCategory({{ r.id }}, this.value)">
            <option value="">-- choose --</option>
            <option value="weddings" {% if r.category == 'weddings' %}selected{% endif %}>Weddings</option>
            <option value="equestrian" {% if r.category == 'equestrian' %}selected{% endif %}>Equestrian</option>
        </select>
    </td>

    <!-- SUBFOLDER -->
    <td>
        {% if r.category %}
            <select onchange="setSubfolder({{ r.id }}, this.value)">
                <option value="">-- choose --</option>

                {% for f in subfolders[r.category] %}
                    <option value="{{ f }}" {% if r.subfolder == f %}selected{% endif %}>
                        {{ f }}
                    </option>
                {% endfor %}

                <option value="new">+ Create new</option>
            </select>
        {% else %}
            <span style="color:#888;">Select category first</span>
        {% endif %}
    </td>

    <td>
        <button onclick="deleteReceipt({{ r.id }})"
                style="background:#b30000; color:white; padding:6px 10px; border:none; border-radius:4px; cursor:pointer;">
            Delete
        </button>
    </td>
</tr>
{% endfor %}
</table>
