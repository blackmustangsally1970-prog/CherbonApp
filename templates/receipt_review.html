<h2>Receipt Review</h2>

<div style="margin-bottom: 20px; display:flex; gap:12px;">
    <a href="{{ url_for('dashboard') }}" class="menu-btn">← Main Menu</a>
</div>

<style>
/* POPUP OVERLAY */
#viewer-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    z-index: 2147483647;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;

    visibility: hidden;
    opacity: 0;
    transition: opacity 0.2s ease;

    overflow: hidden; /* <<< CRITICAL FIX */
}

/* IMAGE CONTAINER — prevents layout collapse */
#viewer-img-container {
    max-height: 70vh;
    max-width: 90vw;
    overflow: hidden; /* <<< CRITICAL FIX */
    display: flex;
    justify-content: center;
    align-items: center;
}

/* POPUP IMAGE */
#viewer-img {
    max-height: 70vh;
    max-width: 90vw;
    object-fit: contain;
    transition: transform 0.3s ease;
    transform-origin: center center; /* <<< CRITICAL FIX */
}
</style>


<table border="1" cellpadding="6" cellspacing="0" style="width:100%; border-collapse:collapse;">
    <tr>
        <th>Image</th>
        <th>Account</th>
        <th>Notes</th>
        <th>Invoice Date</th>
        <th>Paid Date</th>
        <th>Reviewed</th>
        <th>Category</th>
        <th>Subfolder</th>
        <th>Actions</th>
    </tr>

    {% for r in receipts %}
    <tr>

        <!-- IMAGE -->
        <td>
            <img src="/static/{{ r.image_path }}"
                 onclick="openViewer('/static/{{ r.image_path }}')"
                 style="width:120px; border:1px solid #ccc; cursor:pointer;">
        </td>

        <!-- ACCOUNT -->
        <td>
            <select onchange="setAccount({{ r.id }}, this.value)">
                <option value="general"  {% if r.account == 'general' %}selected{% endif %}>General Acc</option>
                <option value="amex"     {% if r.account == 'amex' %}selected{% endif %}>Amex Platinum</option>
                <option value="bendigo"  {% if r.account == 'bendigo' %}selected{% endif %}>Bendigo MC</option>
                <option value="anz"      {% if r.account == 'anz' %}selected{% endif %}>ANZ Visa</option>
            </select>
        </td>


        <!-- NOTES -->
        <td style="white-space:pre-wrap;">
            {{ r.notes }}
        </td>

        <!-- INVOICE DATE -->
        <td>
            <input type="date"
                   value="{{ r.invoice_date if r.invoice_date }}"
                   onchange="setInvoiceDate({{ r.id }}, this.value)">
        </td>

        <!-- PAID DATE -->
        <td>
            <input type="date"
                   value="{{ r.paid_date if r.paid_date }}"
                   onchange="setPaidDate({{ r.id }}, this.value)">
        </td>

        <!-- REVIEWED -->
        <td>
            <input type="checkbox"
                   onchange="markReviewed({{ r.id }}, this)"
                   {% if r.reviewed %}checked{% endif %}>
        </td>

        <!-- CATEGORY -->
        <td>
            <select onchange="setCategory({{ r.id }}, this.value)">
                <option value="">-- choose --</option>
                <option value="weddings"   {% if r.category == 'weddings' %}selected{% endif %}>Weddings</option>
                <option value="equestrian" {% if r.category == 'equestrian' %}selected{% endif %}>Equestrian</option>
            </select>
        </td>

        <!-- SUBFOLDER -->
        <td>
            {% if r.category %}
                <select onchange="setSubfolder({{ r.id }}, this.value)">
                    <option value="">-- choose --</option>

                    {% for f in subfolders[r.category] %}
                        <option value="{{ f }}" {% if r.subfolder == f %}selected{% endif %}>
                            {{ f }}
                        </option>
                    {% endfor %}

                    <option value="new">+ Create new</option>
                </select>
            {% else %}
                <span style="color:#888;">Select category first</span>
            {% endif %}
        </td>

        <!-- ACTIONS -->
        <td>
            <button onclick="deleteReceipt({{ r.id }})"
                    style="background:#b30000; color:white; padding:6px 10px; border:none; border-radius:4px; cursor:pointer;">
                Delete
            </button>
        </td>

    </tr>
    {% endfor %}
</table>


<!-- POPUP VIEWER -->
<div id="viewer-overlay">

    <div id="viewer-img-container">
        <img id="viewer-img">
    </div>

    <div style="margin-top:20px; display:flex; gap:12px;">
        <button type="button"
                onclick="rotateViewer()"
                style="padding:10px 16px; font-size:16px;">
            Rotate
        </button>

        <button type="button"
                onclick="closeViewer()"
                style="padding:10px 16px; font-size:16px; background:#b30000; color:white;">
            Close
        </button>
    </div>

</div>



<script>
let viewerRotation = 0;
let viewerZoom = 1;

/* -----------------------------
   IMAGE VIEWER
------------------------------ */
function openViewer(path) {
    const overlay = document.getElementById("viewer-overlay");
    const img = document.getElementById("viewer-img");

    img.src = path;

    // Reset zoom + rotation
    viewerRotation = 0;
    viewerZoom = 1;

    img.style.transform = "rotate(0deg) scale(1)";

    overlay.style.visibility = "visible";
    overlay.style.opacity = "1";
}

function closeViewer() {
    const overlay = document.getElementById("viewer-overlay");
    overlay.style.opacity = "0";
    setTimeout(() => overlay.style.visibility = "hidden", 200);
}

function rotateViewer() {
    const img = document.getElementById("viewer-img");
    viewerRotation = (viewerRotation + 90) % 360;
    img.style.transform = `rotate(${viewerRotation}deg) scale(${viewerZoom})`;
}

/* -----------------------------
   ZOOM (mouse wheel)
------------------------------ */
document.getElementById("viewer-img").addEventListener("wheel", function (e) {
    e.preventDefault();

    if (e.deltaY < 0) {
        viewerZoom += 0.1; // zoom in
    } else {
        viewerZoom = Math.max(0.2, viewerZoom - 0.1); // zoom out
    }

    this.style.transform = `rotate(${viewerRotation}deg) scale(${viewerZoom})`;
});

/* -----------------------------
   ZOOM (double-click / double-tap)
------------------------------ */
document.getElementById("viewer-img").addEventListener("dblclick", function () {
    viewerZoom = viewerZoom === 1 ? 2 : 1;
    this.style.transform = `rotate(${viewerRotation}deg) scale(${viewerZoom})`;
});

/* -----------------------------
   ACCOUNT
------------------------------ */
function setAccount(id, value) {
    fetch("/set_receipt_account", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ id: id, account: value })
    });
}

/* -----------------------------
   INVOICE DATE
------------------------------ */
function setInvoiceDate(id, value) {
    fetch("/set_receipt_invoice_date", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ id: id, invoice_date: value })
    });
}

/* -----------------------------
   PAID DATE
------------------------------ */
function setPaidDate(id, value) {
    fetch("/set_receipt_paid_date", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ id: id, paid_date: value })
    });
}

/* -----------------------------
   CATEGORY
------------------------------ */
function setCategory(id, value) {
    fetch("/set_receipt_category", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ id: id, category: value })
    })
    .then(() => location.reload());
}

/* -----------------------------
   SUBFOLDER (with NEW folder support)
------------------------------ */
function setSubfolder(id, value) {

    if (value === "new") {
        const name = prompt("Enter new folder name:");

        if (!name) {
            alert("Folder name required");
            return;
        }

        value = name;
    }

    fetch("/set_receipt_subfolder", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ id: id, subfolder: value })
    })
    .then(() => location.reload());
}

/* -----------------------------
   REVIEWED (auto fade-out)
------------------------------ */
function markReviewed(id, checkbox) {
    fetch("/mark_receipt_reviewed", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ id: id, reviewed: checkbox.checked })
    })
    .then(() => {
        if (checkbox.checked) {
            const row = checkbox.closest("tr");
            row.style.transition = "opacity 0.4s ease";
            row.style.opacity = "0";
            setTimeout(() => row.remove(), 400);
        }
    });
}

/* -----------------------------
   DELETE RECEIPT
------------------------------ */
function deleteReceipt(id) {
    if (!confirm("Delete this receipt?")) return;

    fetch("/delete_receipt", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ id: id })
    })
    .then(() => location.reload());
}
</script>
