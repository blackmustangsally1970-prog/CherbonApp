<!DOCTYPE html>
<html>
<head>
    <title>Receipt Review</title>

    <style>
        body { 
            font-family: sans-serif; 
            margin: 20px; 
        }

        table {
            border-collapse: collapse;
            width: 100%;
            margin-top: 20px;
        }

        th, td {
            border: 1px solid #ccc;
            padding: 6px;
            font-size: 14px;
            text-align: left;
            vertical-align: top;
        }

        th {
            background: #f2f2f2;
        }

        .menu-btn {
            display: inline-block;
            background: #eee;
            border: 1px solid #aaa;
            padding: 8px 14px;
            border-radius: 6px;
            font-size: 14px;
            color: #0645AD;
            text-decoration: none;
            margin-right: 12px;
        }

        .menu-btn:hover {
            background: #ddd;
        }

        /* MODAL */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }

        .modal-content {
            background: white;
            padding: 10px;
            border-radius: 10px;
            width: 90%;
            max-width: 900px;
            position: relative;
        }

        .close-modal {
            position: absolute;
            top: 10px;
            right: 20px;
            font-size: 30px;
            cursor: pointer;
        }

        #previewImage {
            max-width: 100%;
            max-height: 80vh;
            object-fit: contain;
            display: none;
        }

        #previewPDF {
            width: 100%;
            height: 80vh;
            border: none;
            display: none;
        }
    </style>
</head>

<body>

<div style="margin-bottom: 20px; display:flex; gap:12px;">
    <a href="{{ url_for('dashboard') }}" class="menu-btn">← Main Menu</a>
</div>

<h2>Receipt Review</h2>

<table>
    <tr>
        <th>Image</th>
        <th>Staff</th>
        <th>Notes</th>
        <th>Date</th>
        <th>Reviewed</th>
    </tr>

    {% for r in receipts %}
    <tr>
        <td>
<a href="#" class="open-preview" data-file="{{ url_for('static', filename='receipts/' + r.image_path) }}">
    <img src="{{ url_for('static', filename='receipts/' + r.image_path) }}" style="width:120px; border:1px solid #ccc;">
</a>
        </td>

        <td>{{ r.staff.name }}</td>

        <td style="white-space:pre-wrap;">{{ r.notes }}</td>

        <td>{{ r.created_at.strftime("%d %b %Y %I:%M %p") }}</td>

        <td>
            <input type="checkbox"
                   onchange="markReviewed({{ r.id }}, this.checked)"
                   {% if r.reviewed %}checked{% endif %}>
        </td>
    </tr>
    {% endfor %}
</table>

<script>
function markReviewed(id, state) {
    fetch("/mark_receipt_reviewed", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ id: id, reviewed: state })
    });
}
</script>

<!-- MODAL -->
<div id="previewModal" class="modal">
    <div class="modal-content">
        <span class="close-modal">&times;</span>

        <img id="previewImage">
        <embed id="previewPDF" type="application/pdf">
    </div>
</div>

<script>
document.querySelectorAll('.open-preview').forEach(btn => {
    btn.addEventListener('click', function(e) {
        e.preventDefault();

        const file = this.dataset.file;
        const lower = file.toLowerCase();

        const modal = document.getElementById('previewModal');
        const img = document.getElementById('previewImage');
        const pdf = document.getElementById('previewPDF');

        // Reset
        img.style.display = "none";
        pdf.style.display = "none";
        img.src = "";
        pdf.src = "";

        // IMAGE DETECTION (case-insensitive)
        if (lower.match(/\.(jpg|jpeg|png|gif|webp)$/i)) {
            img.src = file;
            img.style.display = "block";
        } else {
            pdf.src = file + "#zoom=100";
            pdf.style.display = "block";
        }

        modal.style.display = "flex";
    });
});

document.querySelector('.close-modal').addEventListener('click', () => {
    document.getElementById('previewModal').style.display = 'none';
    document.getElementById('previewImage').src = "";
    document.getElementById('previewPDF').src = "";
});
</script>

</body>
</html>
