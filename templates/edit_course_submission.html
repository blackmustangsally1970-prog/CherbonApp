<!DOCTYPE html>
<html>
<head>
    <title>Change Course</title>

    <style>
        body {
            font-family: sans-serif;
            margin: 25px;
        }

        .container {
            max-width: 500px;
            padding: 20px;
            border: 1px solid #ccc;
            border-radius: 8px;
            background: #fafafa;
        }

        label {
            font-weight: bold;
            display: block;
            margin-bottom: 6px;
        }

        select, button {
            padding: 10px;
            font-size: 15px;
            width: 100%;
            margin-bottom: 15px;
        }

        button {
            background: #4CAF50;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }

        button:hover {
            background: #45a049;
        }

        .cancel-btn {
            display: inline-block;
            margin-top: 10px;
            text-decoration: none;
            color: #0645AD;
        }
    </style>
</head>

<body>

<h2>Change Course for {{ sub.rider_name }}</h2>

<div class="container">

    <form method="POST" action="{{ url_for('update_course_submission', id=sub.id) }}">

        <label>Select New Course:</label>

        <select name="courseno">
            {% for c in courses %}
                <option value="{{ c.course_code }}"
                    {% if c.course_code == sub.courseno %}selected{% endif %}>
                    {{ c.day_of_week }} — {{ c.display_label }} — {{ c.timerange }}
                </option>
            {% endfor %}
        </select>

        <button type="submit">Save Changes</button>
    </form>

    <a class="cancel-btn" href="{{ url_for('course_form_results', year=sub.term_year, term=sub.term_number) }}">
        ← Cancel and go back
    </a>

</div>

</body>
</html>
