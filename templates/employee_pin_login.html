<!DOCTYPE html>
<html>
<head>
    <title>Employee Login</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background:#f5f5f5;
            padding:40px;
            text-align:center;
        }

        h2 {
            font-size:32px;
            margin-bottom:25px;
        }

        .login-box {
            background:white;
            padding:30px;
            max-width:400px;
            margin:0 auto;
            border-radius:12px;
            box-shadow:0 3px 10px rgba(0,0,0,0.15);
        }

        input[type="password"] {
            width:100%;
            padding:15px;
            font-size:20px;
            margin-bottom:20px;
            border-radius:8px;
            border:1px solid #ccc;
        }

        .login-btn {
            width:100%;
            padding:15px;
            background:#2a7ae2;
            color:white;
            border:none;
            border-radius:8px;
            font-size:20px;
            cursor:pointer;
        }

        .login-btn:hover {
            background:#1f5fb4;
        }

        .error {
            color:#d32f2f;
            margin-top:15px;
            font-size:18px;
        }

        .back-btn {
            margin-top:30px;
            padding:15px;
            background:#777;
            color:white;
            border:none;
            border-radius:8px;
            font-size:18px;
            cursor:pointer;
        }

        .back-btn:hover {
            background:#555;
        }
    </style>
</head>
<body>

<h2>Employee Login</h2>

<div class="login-box">

    <form method="POST" action="/employeehours/login">

        <input type="password"
               name="pin"
               placeholder="Enter PIN"
               autofocus
               required>

        <button class="login-btn" type="submit">
            Log In
        </button>

    </form>

    {% if error %}
        <div class="error">{{ error }}</div>
    {% endif %}

</div>

<button class="back-btn" onclick="window.location.href='/'">
    Back
</button>

</body>
</html>
