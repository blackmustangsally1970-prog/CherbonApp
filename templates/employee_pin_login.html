    <!doctype html>
    <html lang="en">
    <head>
        <meta charset="utf-8">
        <title>Employee Login</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    </head>
    <body class="bg-light">

    <div class="container py-5" style="max-width: 420px;">

        <h2 class="text-center mb-4">Employee Login</h2>

        <div class="mb-3">
            <label class="form-label">PIN</label>
            <input type="password"
                   id="pin"
                   class="form-control form-control-lg"
                   maxlength="6"
                   pattern="[0-9]{6}"
                   required>
        </div>

        <button class="btn btn-primary w-100 btn-lg" onclick="submitPin()">Login</button>

        <div id="error" class="text-danger mt-3" style="display:none;">
            Invalid PIN — please try again.
        </div>

    </div>

    <script>
        function submitPin() {
            const pin = document.getElementById("pin").value;

            fetch("/employeehours/login", {
                method: "POST",
                headers: { "Content-Type": "application/x-www-form-urlencoded" },
                body: "pin=" + encodeURIComponent(pin)
            })
            .then(r => r.json())
            .then(data => {
                if (data.status === "ok") {
                    window.location.href = "/employeehours/week";   // ⭐ REDIRECT
                } else {
                    document.getElementById("error").style.display = "block";
                }
            });
        }
    </script>

    </body>
    </html>
