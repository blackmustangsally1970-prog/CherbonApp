<!DOCTYPE html>
<html>
<head>
    <title>Archive Wedding</title>
    <link rel="stylesheet" href="/static/bootstrap.min.css">
</head>

<body>

<div class="container" style="margin-top:30px;">

    <h3>Archive Wedding</h3>
    <p>This will move the wedding for {{ wedding.bride_name }} & {{ wedding.groom_name }} into the archive.</p>

    <form action="/admin/wedding/{{ wedding.id }}/archive" method="POST">

        <div class="form-group">
            <label>Reason (optional)</label>
            <textarea name="archive_reason" class="form-control"></textarea>
        </div>

        <button class="btn btn-dark" style="margin-top:15px;">Confirm Archive</button>
        <a href="/admin/wedding/{{ wedding.id }}" class="btn btn-secondary" style="margin-top:15px;">Back</a>

    </form>

</div>

</body>
</html>
