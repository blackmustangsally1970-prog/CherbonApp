<!DOCTYPE html>
<html>
<head>
    <title>Admin — Home</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background:#f5f5f5;
            padding:40px;
            text-align:center;
        }

        h2 {
            font-size:36px;
            margin-bottom:35px;
        }

        .menu {
            max-width:500px;
            margin:0 auto;
            display:flex;
            flex-direction:column;
            gap:20px;
        }

        .menu-btn {
            padding:20px;
            background:white;
            border:none;
            border-radius:12px;
            font-size:22px;
            font-weight:bold;
            cursor:pointer;
            box-shadow:0 3px 10px rgba(0,0,0,0.15);
            transition:0.2s;
        }

        .menu-btn:hover {
            background:#e8e8e8;
        }

        .logout-btn {
            margin-top:40px;
            padding:18px;
            background:#777;
            color:white;
            border:none;
            border-radius:10px;
            font-size:22px;
            width:260px;
            cursor:pointer;
        }

        .logout-btn:hover {
            background:#555;
        }
    </style>
</head>
<body>

<h2>Admin Panel</h2>

<div class="menu">

    <button class="menu-btn"
            onclick="window.location.href='/admin/employees'">
        Manage Employees
    </button>

    <button class="menu-btn"
            onclick="window.location.href='/admin/employeehours'">
        Employee Hours
    </button>

    <button class="menu-btn"
            onclick="window.location.href='/admin/weeklysummary'">
        Weekly Summary
    </button>

    <button class="menu-btn"
            onclick="window.location.href='/admin/corrections'">
        Corrections Log
    </button>

</div>

<button class="logout-btn" onclick="window.location.href='/'">
    Exit Admin
</button>

</body>
</html>
