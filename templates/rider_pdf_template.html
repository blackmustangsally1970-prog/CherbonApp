<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 40px;
        }
        .title {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 20px;
        }
        .section {
            margin-top: 20px;
            font-size: 16px;
        }
        .label {
            font-weight: bold;
        }
    </style>
</head>

<body>

<div class="title">Rider Lesson Summary</div>

<div class="section">
    <div><span class="label">Rider:</span> {{ rider.first_name }} {{ rider.last_name }}</div>
    <div><span class="label">Course:</span> {{ course.course_code }}</div>
    <div><span class="label">Day:</span> {{ course.day_of_week }}</div>
    <div><span class="label">First Lesson:</span> {{ first_date }}</div>
    <div><span class="label">Last Lesson:</span> {{ last_date }}</div>
</div>

</body>
</html>
