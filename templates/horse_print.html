<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Horse Print – {{ date }}</title>

    <style>
        @page {
            size: A4 portrait;
            margin: 12mm;
        }

        body {
            font-family: Arial, sans-serif;
            font-size: 9pt;
            color: #000;
        }

        h1 {
            font-size: 13pt;
            margin: 0 0 8px 0;
        }

        /* ⭐ BLUE BLOCK HEADER (same as lesson print) */
        .block-header {
            background: #d9e7ff;
            color: #003366;
            padding: 6px 8px;
            font-size: 11pt;
            font-weight: bold;
            border-radius: 4px;
            margin: 14px 0 6px 0;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 10px;
        }

        th, td {
            border: 1px solid #000;
            padding: 3px 4px;
            vertical-align: top;
        }

        th {
            text-align: left;
            font-weight: bold;
            white-space: nowrap;
            background: #f0f0f0;
        }

        /* ⭐ Column widths */
        th:nth-child(1), td:nth-child(1) { width: 120px; }  /* Horse */
        th:nth-child(2), td:nth-child(2) { width: 160px; }  /* Client */
        th:nth-child(3), td:nth-child(3) { width: 35px; }   /* Att */
        th:nth-child(4), td:nth-child(4) { width: 120px; }  /* Teacher */

        /* ⭐ Prevent block splitting */
        .lesson-block {
            page-break-inside: avoid;
            break-inside: avoid;
            margin-bottom: 18px;
        }

        /* ⭐ Repeat table header on each page */
        thead { display: table-header-group; }
        tfoot { display: table-footer-group; }

        /* Mobile-friendly buttons */
        .print-btn,
        .back-btn {
            font-size: 24pt;
            padding: 22px 30px;
            margin-bottom: 20px;
            background: #444;
            color: #fff;
            border: none;
            border-radius: 10px;
            cursor: pointer;
        }

        .back-btn { background: #666; }

        .print-btn:active,
        .back-btn:active {
            background: #222;
        }

        @media print {
            .print-btn,
            .back-btn {
                display: none !important;
            }
        }
    </style>
</head>

<body>

<button class="back-btn" onclick="window.location.href='/lessons_by_date'">
    ← View Lessons by Date
</button>

<button class="print-btn" onclick="window.print()">Print / Save PDF</button>

<h1>Cherbon Waters Equestrian Centre – Horse Print – {{ date }}</h1>

{% for block in grouped %}
<div class="lesson-block">

    <!-- ⭐ BLUE BLOCK HEADER -->
    <div class="block-header">
        {{ block.time }} {{ block.lesson_type }} {{ block.group_priv }}
    </div>

    <table>
        <thead>
            <tr>
                <th>Horse</th>
                <th>Client</th>
                <th>Att</th>
                <th>Teacher</th>
            </tr>
        </thead>

        <tbody>
        {% for r in block.riders %}
            <tr>
                <td>{{ r.horse }}</td>
                <td>{{ r.client_name }}</td>
                <td>{{ r.att }}</td>
                <td>{{ r.teacher or "" }}</td>
            </tr>
        {% endfor %}
        </tbody>
    </table>

</div>
{% endfor %}

</body>
</html>
