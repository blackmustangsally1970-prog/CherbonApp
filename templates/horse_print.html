<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Horse Print – {{ date }}</title>

    <style>
        @page {
            size: A4 portrait;
            margin: 12mm;
        }

        body {
            font-family: Arial, sans-serif;
            font-size: 9pt;
            color: #000;
        }

        h1 {
            font-size: 13pt;
            margin: 0 0 10px 0;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 12px;
        }

        /* ⭐ Base cell styling */
        th, td {
            border: 1px solid #000;
            padding: 3px 4px;
            vertical-align: top;
        }

        th {
            background: #f0f0f0;
            font-weight: bold;
            white-space: nowrap;
        }

        /* ⭐ Column widths */
        th:nth-child(1), td:nth-child(1) { width: 120px; }  /* Horse */
        th:nth-child(2), td:nth-child(2) { width: 160px; }  /* Client */
        th:nth-child(3), td:nth-child(3) { width: 35px; }   /* Att */
        th:nth-child(4), td:nth-child(4) { width: 120px; }  /* Teacher */

        /* ⭐ Keep lesson rows together */
        .lesson-block {
            break-inside: avoid;
            page-break-inside: avoid;
        }

        /* ⭐ Repeat table header on each printed page */
        thead { display: table-header-group; }
        tfoot { display: table-footer-group; }

        /* ⭐ BLUE BLOCK HEADER — MUST COME AFTER td RULE */
        .block-header-row td {
            background: #d9e7ff !important;
            color: #003366 !important;
            font-weight: bold;
            font-size: 11pt;
            padding: 6px 8px;
            border: 1px solid #003366 !important;
        }

        /* Buttons */
        .print-btn,
        .back-btn {
            font-size: 24pt;
            padding: 22px 30px;
            margin-bottom: 20px;
            background: #444;
            color: #fff;
            border: none;
            border-radius: 10px;
            cursor: pointer;
        }

        .back-btn { background: #666; }

        @media print {
            .print-btn,
            .back-btn {
                display: none !important;
            }
        }
    </style>
</head>

<body>

<button class="back-btn" onclick="window.location.href='/lessons_by_date'">
    ← View Lessons by Date
</button>

<button class="print-btn" onclick="window.print()">Print / Save PDF</button>

<h1>Cherbon Waters Equestrian Centre – Horse Print – {{ date }}</h1>

<table>
    <thead>
        <tr>
            <th>Horse</th>
            <th>Client</th>
            <th>Att</th>
            <th>Teacher</th>
        </tr>
    </thead>

    <tbody>

    {% for block in grouped %}
        <tr class="block-header-row">
            <td colspan="4">
                {{ block.time }} {{ block.lesson_type }} {{ block.group_priv }}
            </td>
        </tr>

        {% for r in block.riders %}
        <tr class="lesson-block">
            <td>{{ r.horse }}</td>
            <td>{{ r.client_name }}</td>
            <td>{{ r.att }}</td>
            <td>{{ r.teacher or "" }}</td>
        </tr>
        {% endfor %}

    {% endfor %}

    </tbody>
</table>

</body>
</html>
