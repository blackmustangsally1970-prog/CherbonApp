<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Horse Print – {{ date }}</title>
    <style>
        body { font-family: Arial, sans-serif; font-size: 12px; }
        h2 { margin-top: 20px; border-bottom: 1px solid #000; padding-bottom: 4px; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { border: 1px solid #000; padding: 4px 6px; text-align: left; }
        th { background: #f0f0f0; }
    </style>
</head>
<body>

<h2>Horse Print – {{ date }}</h2>

<table>
    <thead>
        <tr>
            <th>Horse</th>
            <th>Client</th>
            <th>Att</th>
            <th>Lesson Type</th>
            <th>Time</th>
            <th>Teacher</th>
        </tr>
    </thead>
    <tbody>
        {% for l in lessons %}
        <tr>
            <td>{{ l.horse_name or "" }}</td>
            <td>{{ l.client_name }}</td>
            <td>{{ l.attendance or "" }}</td>
            <td>{{ l.lesson_type_name }}</td>
            <td>{{ l.timeframe_name or "" }}</td>
            <td>{{ l.teacher_name or "" }}</td>
        </tr>
        {% endfor %}
    </tbody>
</table>

<script>
    window.print();
</script>

</body>
</html>
