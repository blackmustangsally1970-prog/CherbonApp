<!DOCTYPE html>
<html>
<head>
    <title>Employee Hours</title>
    <style>
        body { font-family: Arial; background:#f5f5f5; padding:40px; text-align:center; }
        .box { background:white; padding:30px; max-width:400px; margin:auto; border-radius:8px; }
        button { width:100%; padding:18px; margin:10px 0; font-size:22px; border:none; border-radius:6px; cursor:pointer; }
        .in { background:#2ecc71; color:white; }
        .break { background:#f1c40f; color:black; }
        .out { background:#e74c3c; color:white; }
    </style>
</head>
<body>

<div class="box">
    <h2>{{ emp.full_name }}</h2>

    {% if not row or not row.sign_in %}
        <button class="in" onclick="go('/employeehours/signin')">SIGN IN</button>

    {% elif row.sign_in and not row.break_start %}
        <button class="break" onclick="go('/employeehours/startbreak')">START BREAK</button>
        <button class="out" onclick="go('/employeehours/signout')">SIGN OUT</button>

    {% elif row.break_start and not row.break_end %}
        <button class="in" onclick="go('/employeehours/endbreak')">END BREAK</button>
        <button class="out" onclick="go('/employeehours/signout')">SIGN OUT</button>

    {% else %}
        <button class="out" onclick="go('/employeehours/signout')">SIGN OUT</button>
    {% endif %}
</div>

<script>
function go(url) {
    fetch(url, { method:"POST" })
        .then(() => window.location.reload());
}
</script>

</body>
</html>
