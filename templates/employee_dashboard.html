<!DOCTYPE html>
<html>
<head>
    <title>Work Dashboard</title>
    <style>
        body { font-family: Arial; background:#f5f5f5; padding:40px; text-align:center; }
        .btn { padding:20px; background:#2a7ae2; color:white; border:none; border-radius:6px; font-size:22px; margin:10px; width:250px; cursor:pointer; }
        .btn:hover { background:#1f5fb4; }
    </style>
</head>
<body>

<h2>Welcome, {{ emp.full_name }}</h2>

{% if not row %}
    <!-- No record for today = NOT SIGNED IN -->
    <button class="btn" onclick="action('signin')">Start Work</button>

{% elif row.sign_in and not row.break_start and not row.sign_out %}
    <!-- Signed in, not on break -->
    <button class="btn" onclick="action('startbreak')">Start Break</button>
    <button class="btn" onclick="action('signout')">Sign Out</button>

{% elif row.break_start and not row.break_end %}
    <!-- On break -->
    <button class="btn" onclick="action('endbreak')">End Break</button>

{% elif row.break_end and not row.sign_out %}
    <!-- Break ended, still working -->
    <button class="btn" onclick="action('signout')">Sign Out</button>

{% else %}
    <!-- Fully completed day -->
    <p>You have finished work for today.</p>
{% endif %}

<script>
function action(type) {
    fetch("/employeehours/" + type, { method: "POST" })
    .then(r => r.json())
    .then(() => location.reload());
}
</script>

</body>
</html>
